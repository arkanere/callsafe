name: callsafe_mobile
description: CallSafe mobile application for Android and iOS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Immutable Data Classes
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Functional Programming
  fpdart: ^1.1.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # Routing
  go_router: ^13.2.0

  # WebSocket & Networking
  web_socket_channel: ^2.4.0

  # WebRTC
  flutter_webrtc: ^1.5.2

  # Utilities
  uuid: ^4.3.3

  # Permissions
  permission_handler: ^11.3.0

  # Push notifications are handled natively (CallSafeFirebaseMessagingService
  # + com.google.firebase:firebase-messaging-ktx in android/app/build.gradle),
  # bridged over the com.callsafe.push channel — no Flutter FCM plugins.

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.11
  hive_generator: ^2.0.1

  # Linting
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
