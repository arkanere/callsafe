name: callsafe_mobile
description: CallSafe mobile application for Android and iOS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Immutable Data Classes
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Functional Programming
  fpdart: ^1.1.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # Routing
  go_router: ^13.2.0

  # WebSocket & Networking
  socket_io_client: ^2.0.3+1

  # WebRTC
  flutter_webrtc: ^0.9.48+hotfix.1

  # Utilities
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.11

  # Linting
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
